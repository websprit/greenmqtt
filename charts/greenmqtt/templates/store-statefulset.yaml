{{- if .Values.storeTopology.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "greenmqtt.storeFullname" . }}
  labels:
    {{- include "greenmqtt.labels" . | nindent 4 }}
    app.kubernetes.io/component: store
spec:
  serviceName: {{ include "greenmqtt.storeHeadlessServiceName" . }}
  replicas: {{ .Values.storeTopology.replicaCount }}
  selector:
    matchLabels:
      {{- include "greenmqtt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: store
  template:
    metadata:
      labels:
        {{- include "greenmqtt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: store
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "greenmqtt.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.storeTopology.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: greenmqtt-state
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              ordinal="${HOSTNAME##*-}"
              case "${ordinal}" in
                ''|*[!0-9]*) export GREENMQTT_NODE_ID="{{ .Values.storeTopology.nodeIdBase }}";;
                *) export GREENMQTT_NODE_ID="$((ordinal + {{ .Values.storeTopology.nodeIdBase }}))";;
              esac
              export GREENMQTT_ADVERTISE_RPC_ENDPOINT="http://${HOSTNAME}.{{ include "greenmqtt.storeHeadlessServiceName" . }}:{{ .Values.storeTopology.service.rpc.port }}"
              exec /usr/local/bin/greenmqtt state-serve
          ports:
            - name: rpc
              containerPort: {{ .Values.storeTopology.service.rpc.targetPort }}
              protocol: {{ .Values.storeTopology.service.rpc.protocol }}
          env:
            {{- include "greenmqtt.storeEnv" . | nindent 12 }}
          {{- with .Values.storeTopology.greenmqtt.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.storeTopology.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.storeTopology.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.storeTopology.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storeTopology.persistence.mountPath }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.storeTopology.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "greenmqtt.labels" . | nindent 10 }}
          app.kubernetes.io/component: store
      spec:
        accessModes:
          {{- toYaml .Values.storeTopology.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.storeTopology.persistence.size }}
        {{- if .Values.storeTopology.persistence.storageClass }}
        storageClassName: {{ .Values.storeTopology.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
