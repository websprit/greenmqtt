apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "greenmqtt.fullname" . }}
  labels:
    {{- include "greenmqtt.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "greenmqtt.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "greenmqtt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "greenmqtt.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "greenmqtt.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: greenmqtt
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              ordinal="${HOSTNAME##*-}"
              case "${ordinal}" in
                ''|*[!0-9]*) export GREENMQTT_NODE_ID="{{ .Values.nodeIdBase }}";;
                *) export GREENMQTT_NODE_ID="$((ordinal + {{ .Values.nodeIdBase }}))";;
              esac
              exec /usr/local/bin/greenmqtt serve
          ports:
            - name: mqtt
              containerPort: {{ .Values.service.mqtt.targetPort }}
              protocol: {{ .Values.service.mqtt.protocol }}
            - name: http
              containerPort: {{ .Values.service.http.targetPort }}
              protocol: {{ .Values.service.http.protocol }}
            - name: rpc
              containerPort: {{ .Values.service.rpc.targetPort }}
              protocol: {{ .Values.service.rpc.protocol }}
          env:
            {{- include "greenmqtt.env" . | nindent 12 }}
          {{- with .Values.greenmqtt.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "greenmqtt.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
