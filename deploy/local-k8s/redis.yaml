apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenmqtt-redis
  namespace: greenmqtt
  labels:
    app.kubernetes.io/name: greenmqtt-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: greenmqtt-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: greenmqtt-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: greenmqtt-redis
  namespace: greenmqtt
  labels:
    app.kubernetes.io/name: greenmqtt-redis
spec:
  selector:
    app.kubernetes.io/name: greenmqtt-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
